<style>
:root{
  --nv:#1a2744;--nvd:#111b33;--nvl:#253560;
  --gd:#c8a84b;--gdl:#e8c86a;--gdp:#f5edd6;
  --gr:#2d7a4f;--bl:#3a5fa8;
  --bg:#f0f2f7;--su:#fff;--su2:#f8f9fc;
  --bd:#dde2ef;--tx:#1a2744;--sb:#6b7a9a;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:var(--tx)}
.hdr{background:linear-gradient(135deg,var(--nvd),var(--nv) 60%,var(--nvl));padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25)}
.hdr-t{color:#fff;font-size:15px;font-weight:700}
.hdr-s{color:var(--gdl);font-size:10px;margin-top:1px}
.badge{background:var(--gd);color:var(--nvd);font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px}
.tabs{display:flex;background:var(--su);border-bottom:2px solid var(--bd);position:sticky;top:56px;z-index:90}
.tb{flex:1;padding:10px 4px 9px;background:none;border:none;font-size:11px;font-weight:600;color:var(--sb);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s}
.tb .ic{font-size:17px}
.tb.on{color:var(--nv);border-bottom-color:var(--gd)}
.pg{display:none;padding:14px}
.pg.on{display:block}
@media(min-width:600px){.pg{padding:18px;max-width:680px;margin:0 auto}}
.card{background:var(--su);border-radius:var(--r);box-shadow:0 2px 12px rgba(26,39,68,.09);padding:14px;margin-bottom:12px}
.ct{font-size:11px;font-weight:700;color:var(--sb);letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.ct::before{content:"";width:3px;height:13px;background:var(--gd);border-radius:2px}
.sw{position:relative;margin-bottom:10px}
.sw input{width:100%;padding:11px 14px 11px 40px;border:2px solid var(--bd);border-radius:var(--r);font-size:15px;background:var(--su);color:var(--tx);outline:none;transition:border .2s}
.sw input:focus{border-color:var(--gd)}
.sw::before{content:"\1F50D";position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px}
.sc{font-size:11px;color:var(--sb);margin-bottom:8px}
.cat-row{background:var(--su);border:1.5px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;overflow:hidden}
.cat-hd{padding:11px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.cat-hd:hover{background:var(--gdp)}
.cat-hd.open{background:var(--nvd);color:#fff}
.cat-name{font-size:13px;font-weight:700}
.cat-cnt{font-size:11px;color:var(--sb)}
.cat-hd.open .cat-cnt{color:var(--gdl)}
.cat-arr{font-size:12px;transition:transform .2s;color:var(--sb);margin-left:6px}
.cat-hd.open .cat-arr{transform:rotate(180deg);color:var(--gdl)}
.cat-body{display:none;border-top:1px solid var(--bd);padding:6px 8px}
.cat-body.open{display:block}
.pi{background:var(--su2);border:1px solid var(--bd);border-radius:6px;padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.pi:hover{border-color:var(--gd);background:var(--gdp)}
.pi:last-child{margin-bottom:0}
.pn{font-size:13px;font-weight:600;margin-bottom:2px}
.pm{font-size:11px;color:var(--sb)}
.pp{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.pt{display:flex;flex-direction:column;align-items:center;background:var(--su);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;min-width:80px}
.pt.re{border-color:var(--gr)}
.pt-l{font-size:9px;font-weight:700;color:var(--sb);margin-bottom:1px}
.pt.re .pt-l{color:var(--gr)}
.pt-v{font-size:12px;font-weight:700}
.pt.re .pt-v{color:var(--gr)}
.sel{width:100%;padding:11px 13px;border:2px solid var(--bd);border-radius:var(--rs);font-size:15px;background:var(--su);color:var(--tx);outline:none;appearance:none;-webkit-appearance:none;margin-bottom:10px}
.sel:focus{border-color:var(--gd)}
.f-res{background:linear-gradient(135deg,#2a4080,var(--nv));border-radius:var(--r);padding:18px;text-align:center;margin-top:10px}
.f-rl{font-size:11px;font-weight:700;color:var(--gdl);letter-spacing:.08em;margin-bottom:4px}
.f-rv{font-size:30px;font-weight:700;color:#fff}
.f-rs{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px}
.mode-sw{display:flex;background:var(--su2);border-radius:var(--rs);padding:3px;margin-bottom:12px;border:1px solid var(--bd)}
.mbt{flex:1;padding:9px 8px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:none;color:var(--sb)}
.mbt.on{background:var(--nv);color:#fff}
.ig{margin-bottom:12px}
.il{font-size:12px;font-weight:600;color:var(--sb);margin-bottom:5px;display:block}
.ir{display:flex;gap:8px;align-items:center}
.ir input{flex:1;padding:11px 13px;border:2px solid var(--bd);border-radius:var(--rs);font-size:16px;font-weight:600;outline:none;transition:border .2s;background:var(--su)}
.ir input:focus{border-color:var(--gd)}
.iu{font-size:12px;font-weight:600;color:var(--sb);white-space:nowrap}
.hint{background:var(--gdp);border:1px solid var(--gd);border-radius:var(--rs);padding:9px 11px;font-size:11px;color:#7a5c10;line-height:1.6;margin-bottom:12px}
.hint b{color:#5a3c00}
.psb{width:100%;padding:12px 13px;border:2px dashed var(--bd);border-radius:var(--rs);background:var(--su2);color:var(--sb);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.psb:hover{border-color:var(--gd);color:var(--tx);background:var(--gdp)}
.psd{background:var(--nvd);border-radius:var(--rs);padding:11px 13px;color:#fff;font-size:13px;font-weight:600;margin-bottom:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.psd .ch{font-size:10px;color:var(--gdl)}
.rc{background:linear-gradient(135deg,var(--nvd),var(--nv));border-radius:var(--r);padding:18px;margin-top:4px}
.rr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rr:last-child{margin-bottom:0}
.rn{font-size:12px;color:rgba(255,255,255,.65)}
.rv{font-size:14px;font-weight:700;color:#fff}
.rr.big .rn{font-size:13px;color:var(--gdl);font-weight:700}
.rr.big .rv{font-size:24px;color:var(--gdl)}
.rr.tax .rn{color:rgba(255,255,255,.55);font-size:11px}
.rr.tax .rv{font-size:13px;color:rgba(255,255,255,.8)}
.rd{border:none;border-top:1px solid rgba(255,255,255,.15);margin:10px 0}
.mo{position:fixed;inset:0;background:rgba(10,20,50,.65);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.md{background:var(--su);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(26,39,68,.2)}
.mh{padding:14px 14px 11px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mt{font-size:15px;font-weight:700}
.mx{width:28px;height:28px;border:none;background:var(--su2);border-radius:50%;font-size:15px;cursor:pointer}
.msw{padding:9px 13px;border-bottom:1px solid var(--bd);position:relative}
.msw input{width:100%;padding:9px 13px 9px 36px;border:2px solid var(--bd);border-radius:7px;font-size:14px;outline:none}
.msw input:focus{border-color:var(--gd)}
.msw::before{content:"\1F50D";position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:14px}
.mb2{overflow-y:auto;padding:8px 12px 28px;flex:1}
.mcat-row{border:1.5px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;overflow:hidden}
.mcat-hd{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--su2)}
.mcat-hd:hover{background:var(--gdp)}
.mcat-hd.open{background:var(--nvd);color:#fff}
.mcat-nm{font-size:13px;font-weight:700}
.mcat-cnt{font-size:11px;color:var(--sb)}
.mcat-hd.open .mcat-cnt{color:var(--gdl)}
.mcat-arr{font-size:11px;color:var(--sb);transition:transform .2s;margin-left:6px}
.mcat-hd.open .mcat-arr{transform:rotate(180deg);color:var(--gdl)}
.mcat-body{display:none;border-top:1px solid var(--bd);padding:5px 7px}
.mcat-body.open{display:block}
.mpi{padding:9px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:4px}
.mpi:hover{background:var(--su2);border-color:var(--bd)}
.mpi:last-child{margin-bottom:0}
.mpn{font-size:13px;font-weight:600}
.mpm{font-size:11px;color:var(--sb)}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--nvd);color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;max-width:90vw}
#toast.on{transform:translateX(-50%) translateY(0)}
</style>

    var grp=g[key];var prods=grp.items;var mid="mc-"+ci++;
    var bc=bc_map[grp.bumon]||"#6b7a9a";
    html+="<div class='mcat-row'><div class='mcat-hd' onclick='toggleMCat(\""+mid+"\")' id='mhd-"+mid+"'>";
    html+="<span class='mcat-nm'>"+esc(grp.category)+"</span>";
    html+="<span style='display:flex;align-items:center;gap:6px'><span style='font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:"+bc+";color:#fff'>"+esc(grp.bumon)+"</span><span class='mcat-cnt'>"+prods.length+"\u4ef6</span><span class='mcat-arr'>\u25bc</span></span>";
    html+="</div><div class='mcat-body' id='"+mid+"'>";
    prods.forEach(function(p){
      var d=JSON.stringify(p);
      html+="<div class='mpi' data-prod='"+d.replace(/'/g,"&#39;")+"'onclick='selectProd(this)'><div class='mpn'>"+esc(p.name)+"</div>"+(p.model?"<div class='mpm'>"+esc(p.model)+"</div>":"")+"</div>";
    });
    html+="</div></div>";
  }
  document.getElementById("modal-body").innerHTML=html;
}
function toggleMCat(id){var body=document.getElementById(id);var hd=document.getElementById("mhd-"+id);var o=body.classList.toggle("open");hd.classList.toggle("open",o);}
function selectProd(el){
  var p=JSON.parse(el.getAttribute("data-prod"));
  closeModal();
  selProd[modalFor]=p;
  var nh=esc(p.name)+(p.model?" <span style='opacity:.6;font-size:11px'>"+esc(p.model)+"</span>":"");
  if(modalFor==="kaku"){
    shikiriVal=p.prices&&p.prices[kakuKbn]?p.prices[kakuKbn]:0;
    shikiriVisible=false;
    document.getElementById("k-psb").style.display="none";
    document.getElementById("k-psd").style.display="";
    document.getElementById("k-psd").innerHTML="<div class='psd' onclick='openModal(\"kaku\")'><div>&#x1F4E6; "+nh+"</div><div class='ch'>\u5909\u66f4</div></div>"+"<div style='display:flex;align-items:center;gap:10px;margin-bottom:12px'><span style='font-size:12px;color:var(--sb);font-weight:600'>\u4ed5\u5207\u4fa1\u683c</span><button id='shikiri-btn' onclick='toggleShikiri()' style='padding:4px 12px;border:2px solid var(--bd);border-radius:20px;background:var(--su2);color:var(--sb);font-size:11px;font-weight:700;cursor:pointer'>OFF</button><span id='shikiri-disp' style='display:none;font-size:14px;font-weight:700;color:var(--gd)'></span></div>";
    document.getElementById("k-base-area").innerHTML="";
    calcKaku();
    toast(shikiriVal?"\u2705 \u4ed5\u5207\u4fa1\u683c\u3092\u53d6\u5f97\u3057\u307e\u3057\u305f":"\u26a0\ufe0f \u4ed5\u5207\u4fa1\u683c\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093");
  }else{
    document.getElementById("f-psb").style.display="none";
    document.getElementById("f-psd").style.display="";
    document.getElementById("f-psd").innerHTML="<div class='psd' onclick='openModal(\"freight\")'><div>&#x1F4E6; "+nh+"</div><div class='ch'>\u5909\u66f4</div></div>";
    calcFreight();
    toast("\u2705 \u5546\u54c1\u3092\u9078\u629e\u3057\u307e\u3057\u305f");
  }
}
document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});
renderRetail();
</script>
<script>
var deferredPrompt=null;
var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
var isStandalone=window.navigator.standalone===true||window.matchMedia("(display-mode: standalone)").matches;
if(isIOS&&!isStandalone)document.getElementById("ios-banner").style.display="block";
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferredPrompt=e;document.getElementById("android-banner").style.display="flex";});
var ibtn=document.getElementById("install-btn");
if(ibtn)ibtn.addEventListener("click",function(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(r){if(r.outcome==="accepted")document.getElementById("android-banner").style.display="none";deferredPrompt=null;});});
window.addEventListener("appinstalled",function(){document.getElementById("android-banner").style.display="none";document.getElementById("ios-banner").style.display="none";});
</script>
