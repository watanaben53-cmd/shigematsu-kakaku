<style>
:root{--nv:#1a2744;--nvd:#111b33;--nvl:#253560;--gd:#c8a84b;--gdl:#e8c86a;--gdp:#f5edd6;--gr:#2d7a4f;--bl:#3a5fa8;--bg:#f0f2f7;--su:#fff;--su2:#f8f9fc;--bd:#dde2ef;--tx:#1a2744;--sb:#6b7a9a;--r:12px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:var(--tx)}
.hdr{background:linear-gradient(135deg,var(--nvd),var(--nv) 60%,var(--nvl));padding:12px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25)}
.hdr-t{color:#fff;font-size:15px;font-weight:700}.hdr-s{color:var(--gdl);font-size:10px;margin-top:1px}
.badge{background:var(--gd);color:var(--nvd);font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px}
.tabs{display:flex;background:var(--su);border-bottom:2px solid var(--bd);position:sticky;top:56px;z-index:90}
.tb{flex:1;padding:10px 4px 9px;background:none;border:none;font-size:11px;font-weight:600;color:var(--sb);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s}
.tb .ic{font-size:17px}.tb.on{color:var(--nv);border-bottom-color:var(--gd)}
.pg{display:none;padding:14px}.pg.on{display:block}
@media(min-width:600px){.pg{padding:18px;max-width:680px;margin:0 auto}}
.card{background:var(--su);border-radius:var(--r);box-shadow:0 2px 12px rgba(26,39,68,.09);padding:14px;margin-bottom:12px}
.ct{font-size:11px;font-weight:700;color:var(--sb);letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.ct::before{content:"";width:3px;height:13px;background:var(--gd);border-radius:2px}
.sw{position:relative;margin-bottom:10px}
.sw input{width:100%;padding:11px 14px 11px 40px;border:2px solid var(--bd);border-radius:var(--r);font-size:15px;background:var(--su);color:var(--tx);outline:none;transition:border .2s}
.sw input:focus{border-color:var(--gd)}.sw::before{content:"\1F50D";position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px}
.sc{font-size:11px;color:var(--sb);margin-bottom:8px}
.cat-row{background:var(--su);border:1.5px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;overflow:hidden}
.cat-hd{padding:11px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.cat-hd:hover{background:var(--gdp)}.cat-hd.open{background:var(--nvd);color:#fff}
.cat-name{font-size:13px;font-weight:700}.cat-cnt{font-size:11px;color:var(--sb)}.cat-hd.open .cat-cnt{color:var(--gdl)}
.cat-arr{font-size:12px;transition:transform .2s;color:var(--sb);margin-left:6px}.cat-hd.open .cat-arr{transform:rotate(180deg);color:var(--gdl)}
.cat-body{display:none;border-top:1px solid var(--bd);padding:6px 8px}.cat-body.open{display:block}
.pi{background:var(--su2);border:1px solid var(--bd);border-radius:6px;padding:9px 11px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.pi:hover{border-color:var(--gd);background:var(--gdp)}.pi:last-child{margin-bottom:0}
.pn{font-size:13px;font-weight:600;margin-bottom:2px}.pm{font-size:11px;color:var(--sb)}
.pp{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.pt{display:flex;flex-direction:column;align-items:center;background:var(--su);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;min-width:80px}
.pt.re{border-color:var(--gr)}.pt-l{font-size:9px;font-weight:700;color:var(--sb);margin-bottom:1px}.pt.re .pt-l{color:var(--gr)}
.pt-v{font-size:12px;font-weight:700}.pt.re .pt-v{color:var(--gr)}
.sel{width:100%;padding:11px 13px;border:2px solid var(--bd);border-radius:var(--rs);font-size:15px;background:var(--su);color:var(--tx);outline:none;appearance:none;-webkit-appearance:none;margin-bottom:10px}
.sel:focus{border-color:var(--gd)}
.f-res{background:linear-gradient(135deg,#2a4080,var(--nv));border-radius:var(--r);padding:18px;text-align:center;margin-top:10px}
.f-rl{font-size:11px;font-weight:700;color:var(--gdl);letter-spacing:.08em;margin-bottom:4px}.f-rv{font-size:30px;font-weight:700;color:#fff}.f-rs{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px}
.mode-sw{display:flex;background:var(--su2);border-radius:var(--rs);padding:3px;margin-bottom:12px;border:1px solid var(--bd)}
.mbt{flex:1;padding:9px 8px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;background:none;color:var(--sb)}.mbt.on{background:var(--nv);color:#fff}
.ig{margin-bottom:12px}.il{font-size:12px;font-weight:600;color:var(--sb);margin-bottom:5px;display:block}
.ir{display:flex;gap:8px;align-items:center}
.ir input{flex:1;padding:11px 13px;border:2px solid var(--bd);border-radius:var(--rs);font-size:16px;font-weight:600;outline:none;transition:border .2s;background:var(--su)}.ir input:focus{border-color:var(--gd)}
.iu{font-size:12px;font-weight:600;color:var(--sb);white-space:nowrap}
.hint{background:var(--gdp);border:1px solid var(--gd);border-radius:var(--rs);padding:9px 11px;font-size:11px;color:#7a5c10;line-height:1.6;margin-bottom:12px}.hint b{color:#5a3c00}
.psb{width:100%;padding:12px 13px;border:2px dashed var(--bd);border-radius:var(--rs);background:var(--su2);color:var(--sb);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:8px;margin-bottom:10px}
.psb:hover{border-color:var(--gd);color:var(--tx);background:var(--gdp)}
.psd{background:var(--nvd);border-radius:var(--rs);padding:11px 13px;color:#fff;font-size:13px;font-weight:600;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}.psd .ch{font-size:10px;color:var(--gdl)}
.rc{background:linear-gradient(135deg,var(--nvd),var(--nv));border-radius:var(--r);padding:18px;margin-top:4px}
.rr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.rr:last-child{margin-bottom:0}
.rn{font-size:12px;color:rgba(255,255,255,.65)}.rv{font-size:14px;font-weight:700;color:#fff}
.rr.big .rn{font-size:13px;color:var(--gdl);font-weight:700}.rr.big .rv{font-size:24px;color:var(--gdl)}
.rr.tax .rn{color:rgba(255,255,255,.55);font-size:11px}.rr.tax .rv{font-size:13px;color:rgba(255,255,255,.8)}
.rd{border:none;border-top:1px solid rgba(255,255,255,.15);margin:10px 0}
.item-card{background:var(--su);border:1.5px solid var(--bd);border-radius:var(--rs);padding:12px;margin-bottom:10px;position:relative}
.item-card.has-prod{border-color:var(--gd)}
.item-del{position:absolute;top:8px;right:8px;width:26px;height:26px;border:none;background:var(--bd);border-radius:50%;font-size:14px;cursor:pointer;color:var(--sb);font-weight:700;line-height:26px;text-align:center}
.item-del:hover{background:#e0c0c0;color:#900}
.item-sub{background:var(--nvd);border-radius:6px;padding:8px 10px;margin-top:8px}
.item-sub-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}.item-sub-row:last-child{margin-bottom:0}
.item-sub-label{color:rgba(255,255,255,.6)}.item-sub-val{color:#fff;font-weight:700}
.item-sub-row.main .item-sub-label{color:var(--gdl);font-weight:700}.item-sub-row.main .item-sub-val{color:var(--gdl);font-size:14px}
.mo{position:fixed;inset:0;background:rgba(10,20,50,.65);z-index:200;display:none;align-items:flex-end;justify-content:center}.mo.on{display:flex}
.md{background:var(--su);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(26,39,68,.2)}
.mh{padding:14px 14px 11px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.mt{font-size:15px;font-weight:700}.mx{width:28px;height:28px;border:none;background:var(--su2);border-radius:50%;font-size:15px;cursor:pointer}
.msw{padding:9px 13px;border-bottom:1px solid var(--bd);position:relative}
.msw input{width:100%;padding:9px 13px 9px 36px;border:2px solid var(--bd);border-radius:7px;font-size:14px;outline:none}.msw input:focus{border-color:var(--gd)}
.msw::before{content:"\1F50D";position:absolute;left:22px;top:50%;transform:translateY(-50%);font-size:14px}
.mb2{overflow-y:auto;padding:8px 12px 28px;flex:1}
.mcat-row{border:1.5px solid var(--bd);border-radius:var(--rs);margin-bottom:6px;overflow:hidden}
.mcat-hd{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--su2)}
.mcat-hd:hover{background:var(--gdp)}.mcat-hd.open{background:var(--nvd);color:#fff}
.mcat-nm{font-size:13px;font-weight:700}.mcat-cnt{font-size:11px;color:var(--sb)}.mcat-hd.open .mcat-cnt{color:var(--gdl)}
.mcat-arr{font-size:11px;color:var(--sb);transition:transform .2s;margin-left:6px}.mcat-hd.open .mcat-arr{transform:rotate(180deg);color:var(--gdl)}
.mcat-body{display:none;border-top:1px solid var(--bd);padding:5px 7px}.mcat-body.open{display:block}
.mpi{padding:9px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:4px}

function groupByCat(list){
  var g={};
  list.forEach(function(p){
    if(!p.name)return;
    var key=(p.bumon||'\u305d\u306e\u4ed6')+'__'+(p.category||'\u305d\u306e\u4ed6');
    if(!g[key])g[key]={bumon:p.bumon||'\u305d\u306e\u4ed6',category:p.category||'\u305d\u306e\u4ed6',items:[]};
    g[key].items.push(p);
  });
  return g;
}

function calcFreight(){
  var pref=document.getElementById('f-pref').value;
  var qty=parseInt(document.getElementById('f-qty').value)||1;
  var prod=selProd.freight;
  if(!pref||!prod){document.getElementById('f-res-v').textContent='\u2014';document.getElementById('f-res-s').textContent='\u90fd\u9053\u5e9c\u770c\u3068\u5546\u54c1\u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044';return;}
  var base=prod.freight&&prod.freight[pref]?prod.freight[pref]:null;
  if(!base){document.getElementById('f-res-v').textContent='\u8981\u78ba\u8a8d';document.getElementById('f-res-s').textContent=pref+' \u306e\u904b\u8cc3\u30c7\u30fc\u30bf\u304c\u3042\u308a\u307e\u305b\u3093';return;}
  document.getElementById('f-res-v').textContent=fmt(calcFrt(base)*qty);
  document.getElementById('f-res-s').textContent=pref+'  \u57fa\u672c'+fmt(base)+' \u2192 \u639b\u5f8c'+fmt(calcFrt(base))+' \xd7 '+qty+'\u53f0';
}

function getShikiri(prod){
  if(!prod||!prod.prices)return 0;
  var kbn=document.getElementById('kbn-sel').value||'K';
  if(kbn==='J'&&nagasakiOn){
    var kp=prod.prices['K']||0;
    return kp?Math.ceil(kp/0.94/100)*100:0;
  }
  return prod.prices[kbn]||0;
}
function toggleNagasaki(){

  if(btn){
    btn.textContent=nagasakiOn?'ON':'OFF';
    btn.style.background=nagasakiOn?'var(--nv)':'var(--su2)';
    btn.style.color=nagasakiOn?'#fff':'var(--sb)';
    btn.style.borderColor=nagasakiOn?'var(--nv)':'var(--bd)';
  }
  // 仕切価格表示中のアイテムも更新
  items.forEach(function(it){
    if(it.sv&&it.prod){
      var disp=document.getElementById('sd'+it.id);

  });

    var hp=!!it.prod;
    out+='<div class="item-card'+(hp?' has-prod':'')+'" id="'+it.id+'">';
    out+='<button class="item-del" data-del="'+it.id+'">\xd7</button>';
    if(!hp){
      out+='<button class="psb" data-chg="'+it.id+'" style="margin-bottom:8px">&#x1F4E6; \u5546\u54c1\u3092\u9078\u629e</button>';
    }else{
      var p=it.prod;
      out+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-right:32px">';
      out+='<div style="font-size:13px;font-weight:700">&#x1F4E6; '+esc(p.name)+'</div>';
      out+='<button data-chg="'+it.id+'" style="font-size:10px;color:var(--gdl);background:var(--nvd);border:none;border-radius:8px;padding:3px 8px;cursor:pointer;white-space:nowrap">\u5909\u66f4</button>';
      out+='</div>';
      if(p.model)out+='<div style="font-size:11px;color:var(--sb);margin-bottom:6px">'+esc(p.model)+'</div>';
      out+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
      out+='<span style="font-size:11px;color:var(--sb);font-weight:600">\u4ed5\u5207\u4fa1\u683c</span>';
      var on=it.sv;
      out+='<button id="sb'+it.id+'" data-sv="'+it.id+'" style="padding:3px 10px;border:2px solid '+(on?'var(--nv)':'var(--bd)')+';border-radius:16px;background:'+(on?'var(--nv)':'var(--su2)')+';color:'+(on?'#fff':'var(--sb)')+';font-size:10px;font-weight:700;cursor:pointer">'+(on?'ON':'OFF')+'</button>';
      out+='<span id="sd'+it.id+'" style="font-size:13px;font-weight:700;color:var(--gd);display:'+(on?'inline':'none')+'"></span>';
      out+='</div>';
    }
    out+='<div style="display:flex;align-items:center;gap:8px;margin-top:8px">';
    out+='<label style="font-size:11px;font-weight:600;color:var(--sb)">\u53f0\u6570</label>';
    out+='<input type="number" value="'+it.qty+'" min="1" max="99" data-qid="'+it.id+'" oninput="updateQty(this.getAttribute(\'data-qid\'),this.value)" style="width:70px;padding:7px 10px;border:2px solid var(--bd);border-radius:6px;font-size:15px;font-weight:700;outline:none;background:var(--su)">';
    out+='<span style="font-size:12px;color:var(--sb)">\u53f0</span></div>';
    out+='<div id="isub'+it.id+'" class="item-sub" style="display:none"></div>';
    out+='</div>';
  });
  wrap.innerHTML=out;
}

function calcAll(){
  var kbn=document.getElementById('kbn-sel').value||'K';
  var rate=parseFloat(document.getElementById('k-rate').value)||0;
  var pref=document.getElementById('k-pref').value;
  var tc=document.getElementById('k-total-card');
  if(!items.length||!rate){tc.style.display='none';return;}
  var bodyTotal=0,frtTotal=0,sumRows='',anyReady=false;
  items.forEach(function(it){
    var se=document.getElementById('isub'+it.id);
    if(!it.prod){if(se)se.style.display='none';return;}
    var sv=getShikiri(it.prod);
    if(!sv){if(se)se.style.display='none';return;}
    anyReady=true;
    var unit=kakuMode==='outer'?sv*(1+rate/100):sv/(1-rate/100);
    var fb=pref&&it.prod.freight&&it.prod.freight[pref]?it.prod.freight[pref]:0;
    var fu=fb?calcFrt(fb):0;
    var lb=unit*it.qty,lf=fu*it.qty,ls=lb+lf;
    bodyTotal+=lb;frtTotal+=lf;
    if(se){
      se.style.display='block';
      var sr='<div class="item-sub-row"><span class="item-sub-label">1\u53f0\u306e\u63d0\u793a\u4fa1\u683c</span><span class="item-sub-val">'+fmt(unit)+'</span></div>';
      if(fu)sr+='<div class="item-sub-row"><span class="item-sub-label">\u904b\u8cc3(\u57fa\u672c'+fmt(fb)+'\u2192\u639b\u5f8c)</span><span class="item-sub-val">'+fmt(fu)+'</span></div>';
      sr+='<div class="item-sub-row main"><span class="item-sub-label">\u5c0f\u8a08\xd7'+it.qty+'\u53f0</span><span class="item-sub-val">'+fmt(ls)+'</span></div>';
      se.innerHTML=sr;
    }
    sumRows+='<div class="rr"><span class="rn">'+esc(it.prod.name)+(it.qty>1?' \xd7'+it.qty+'\u53f0':'')+'</span><span class="rv">'+fmt(ls)+'</span></div>';
  });
  if(!anyReady){tc.style.display='none';return;}
  var gs=bodyTotal+frtTotal,tax=Math.floor(gs*0.1);
  tc.style.display='block';
  document.getElementById('k-sum-label').textContent=kbn+' / '+rate+'% / '+(kakuMode==='outer'?'\u5916\u639b\u3051':'\u5185\u639b\u3051')+(pref?' / '+pref:'');
  document.getElementById('k-items-summary').innerHTML=sumRows;
  var fr=document.getElementById('k-frt-total-row');
  if(frtTotal>0){fr.style.display='flex';document.getElementById('k-frt-total-l').textContent='\u904b\u8cc3\u5408\u8a08'+(pref?' ('+pref+')':'');document.getElementById('k-frt-total-v').textContent=fmt(frtTotal);}else{fr.style.display='none';}
  document.getElementById('k-body-total').textContent=fmt(bodyTotal);
  document.getElementById('k-sub-total').textContent=fmt(gs);
  document.getElementById('k-tax-total').textContent=fmt(tax);
  document.getElementById('k-grand-total').textContent=fmt(gs+tax);
}

function openModal(t){
  modalFor=t;modalTargetId=null;
  document.getElementById('modal').classList.add('on');
  document.getElementById('modal-q').value='';
  renderModal();
  setTimeout(function(){document.getElementById('modal-q').focus();},100);
}
function openModalFor(itemId){
  modalFor='kaku_item';modalTargetId=itemId;
  document.getElementById('modal').classList.add('on');
  document.getElementById('modal-q').value='';
  renderModal();
  setTimeout(function(){document.getElementById('modal-q').focus();},100);
}
function closeModal(){document.getElementById('modal').classList.remove('on');}

function renderModal(){
  var q=(document.getElementById('modal-q').value||'').trim().toLowerCase();
  var filtered=PRODS.filter(function(p){
    if(!p.name)return false;
    if(!q)return true;
    return (p.name+' '+(p.model||'')+' '+(p.category||'')).toLowerCase().indexOf(q)>=0;
  });
  if(!filtered.length){document.getElementById('modal-body').innerHTML='<div style="text-align:center;padding:24px;color:var(--sb);font-size:13px">\u8a72\u5f53\u5546\u54c1\u306a\u3057</div>';return;}
  var g=groupByCat(filtered),html='',ci=0;
  for(var key in g){
    var grp=g[key],prods=grp.items,mid='mc'+ci++;
    var bc=BC[grp.bumon]||'#6b7a9a';
    html+='<div class="mcat-row"><div class="mcat-hd" data-mcat="'+mid+'" id="mhd'+mid+'">';
    html+='<span class="mcat-nm">'+esc(grp.category)+'</span>';
    html+='<span style="display:flex;align-items:center;gap:6px"><span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:'+bc+';color:#fff">'+esc(grp.bumon)+'</span><span class="mcat-cnt">'+prods.length+'\u4ef6</span><span class="mcat-arr">\u25bc</span></span>';
    html+='</div><div class="mcat-body" id="'+mid+'">';
    prods.forEach(function(p){
      var d=JSON.stringify(p);
      html+='<div class="mpi" data-prod=\''+d.replace(/'/g,"&#39;")+'\'>';
      html+='<div class="mpn">'+esc(p.name)+'</div>';
      if(p.model)html+='<div class="mpm">'+esc(p.model)+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  }
  document.getElementById('modal-body').innerHTML=html;
}

function selectProd(el){
  var p=JSON.parse(el.getAttribute('data-prod'));
  closeModal();
  var nh=esc(p.name)+(p.model?' <span style="opacity:.6;font-size:11px">'+esc(p.model)+'</span>':'');
  if(modalFor==='kaku_item'){
    var it=items.find(function(x){return x.id===modalTargetId;});
    if(it){
      it.prod=p;it.sv=false;
      renderItems();calcAll();
      var sv=p.prices&&p.prices[kakuKbn]?p.prices[kakuKbn]:0;
      toast(sv?'\u2705 \u5546\u54c1\u3092\u9078\u629e\u3057\u307e\u3057\u305f':'\u26a0\ufe0f \u4ed5\u5207\u4fa1\u683c\u30c7\u30fc\u30bf\u306a\u3057');
    }
  }else{
    selProd[modalFor]=p;
    document.getElementById('f-psb').style.display='none';
    document.getElementById('f-psd').style.display='';
    document.getElementById('f-psd').innerHTML='<div class="psd" data-freight="1"><div>&#x1F4E6; '+nh+'</div><div class="ch">\u5909\u66f4</div></div>';
    calcFreight();
    toast('\u2705 \u5546\u54c1\u3092\u9078\u629e\u3057\u307e\u3057\u305f');
  }
}

document.addEventListener('click',function(e){
  if(e.target.closest('[data-freight]'))openModal('freight');
  if(e.target===document.getElementById('modal'))closeModal();
},true);

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

var deferredPrompt=null;
var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
var isStandalone=window.navigator.standalone===true||window.matchMedia('(display-mode: standalone)').matches;
if(isIOS&&!isStandalone)document.getElementById('ios-banner').style.display='block';
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;document.getElementById('android-banner').style.display='flex';});
var ibtn=document.getElementById('install-btn');
if(ibtn)ibtn.addEventListener('click',function(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(r){if(r.outcome==='accepted')document.getElementById('android-banner').style.display='none';deferredPrompt=null;});});
window.addEventListener('appinstalled',function(){document.getElementById('android-banner').style.display='none';document.getElementById('ios-banner').style.display='none';});

renderRetail();
addItem();

</script>
